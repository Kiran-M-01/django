<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My website{% endblock %}</title>
    <style>
    *{
    margin: 0px;
    padding: 0px;
    box-sizing: border-box;
    }
nav{
    height: 70px;
    padding: 0px 100px;
    border-bottom: 2px solid;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color:#131921;
    color:white;

}
.left{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap:20px;
}
.right ul{
    display: flex;
    justify-content: space-around;
    column-gap:20px ;
}
.right ul li{
    display: flex;
    justify-content: space-around;
    align-items: center;
}
button{
    background-color: black;
    color: white;
    padding: 7px 10px;
    border-radius: 30px;
}
button:hover{
    background-color: red;
} 

/* STYLING THE MAIN SECTION */



/* STYLING THE FOOTER SECTION */
.footer ul{
    width:100vw;
    height:10vh;
    display:flex;
    justify-content:center;
    gap:20px;
    align-items:center;
    list-style:none;

    background-color:#232F3E;
    color:white;


}
footer{
    margin-bottom:0px;
}
.search-bar{
    padding:30px;
    
}
input{
    padding:10px;
    width:40rem;
    border-radius:10px;
    border : 2px solid orange;
    font-size:1rem;
}

    </style>
</head>
<body>
    {% include 'partials/header.html' %}
    <br>
    
    {% block content %} 
    <h1>Products will be displayed here</h1>
    {% endblock %}

    <!-- {% block footer %} -->
    {% include 'partials/footer.html' %}

    <!-- {% endblock %} -->
</body>
</html>
